<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>螢幕分享工具 | Leo's Technical Debt</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── 網站導覽列 ─────────────────────────────────────── -->
  <nav id="site-nav">
    <a href="/" class="site-home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M19 12H5M12 5l-7 7 7 7" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Leo's Technical Debt
    </a>
    <span class="breadcrumb">/ 螢幕分享工具</span>
  </nav>

  <!-- Toast 通知 -->
  <div id="toast" class="toast"></div>

  <!-- ══════════════════════════════════════════════════════
       View: Home
  ══════════════════════════════════════════════════════ -->
  <section id="view-home" class="view active">
    <div class="home-inner">
      <div class="home-title">
        <div class="logo-icon">⬡</div>
        <h1>螢幕分享</h1>
        <p class="subtitle">選擇您的角色以開始（需在同一瀏覽器的兩個分頁中使用）</p>
      </div>

      <div class="role-grid">
        <button class="role-card" id="btn-goto-host">
          <div class="role-icon host-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <rect x="2" y="3" width="20" height="14" rx="2"/>
              <path d="M8 21h8M12 17v4"/>
              <path d="M8 9l3 3 5-5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="role-info">
            <h2>分享螢幕</h2>
            <span class="role-badge">Host</span>
            <p>選擇要分享的螢幕並開始廣播</p>
          </div>
          <div class="role-arrow">→</div>
        </button>

        <button class="role-card" id="btn-goto-viewer">
          <div class="role-icon viewer-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </div>
          <div class="role-info">
            <h2>觀看畫面</h2>
            <span class="role-badge viewer">Client</span>
            <p>連線到分享者並觀看即時畫面</p>
          </div>
          <div class="role-arrow">→</div>
        </button>
      </div>
    </div>
  </section>

  <!-- ══════════════════════════════════════════════════════
       View: Host
  ══════════════════════════════════════════════════════ -->
  <section id="view-host" class="view">
    <header class="top-bar">
      <button id="btn-host-back" class="btn-back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 12H5M12 5l-7 7 7 7" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        返回
      </button>
      <h2>分享螢幕</h2>
      <div id="viewer-count" class="viewer-badge">
        <span class="dot-live"></span>觀看者 <span id="viewer-num">0</span> 人
      </div>
    </header>

    <div class="host-body">
      <div id="host-status-bar" class="status-bar idle">
        <span class="status-dot"></span>
        <span id="host-status-text">連線中...</span>
      </div>

      <div id="host-preview-wrap" class="preview-wrap hidden">
        <video id="host-preview" muted autoplay playsinline></video>
        <div class="preview-label">預覽畫面</div>
      </div>

      <div id="host-placeholder" class="placeholder">
        <div class="placeholder-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
            <rect x="2" y="3" width="20" height="14" rx="2"/>
            <path d="M8 21h8M12 17v4"/>
          </svg>
        </div>
        <p>點擊「選擇螢幕」選取要分享的畫面</p>
      </div>

      <div class="host-actions">
        <button id="btn-select-screen" class="btn btn-secondary" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="3" width="20" height="14" rx="2"/>
            <path d="M8 21h8M12 17v4"/>
          </svg>
          選擇螢幕
        </button>
        <button id="btn-start-share" class="btn btn-primary" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <polygon points="10,8 16,12 10,16" fill="currentColor" stroke="none"/>
          </svg>
          開始分享
        </button>
        <button id="btn-stop-share" class="btn btn-danger" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <rect x="9" y="9" width="6" height="6" fill="currentColor" stroke="none"/>
          </svg>
          停止分享
        </button>
      </div>
    </div>
  </section>

  <!-- ══════════════════════════════════════════════════════
       View: Viewer
  ══════════════════════════════════════════════════════ -->
  <section id="view-viewer" class="view">
    <header class="top-bar" id="viewer-topbar">
      <button id="btn-viewer-back" class="btn-back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 12H5M12 5l-7 7 7 7" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        返回
      </button>
      <h2>觀看畫面</h2>
      <button id="btn-fullscreen" class="btn-icon hidden" title="全螢幕">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M8 3H5a2 2 0 0 0-2 2v3M21 8V5a2 2 0 0 0-2-2h-3M3 16v3a2 2 0 0 0 2 2h3M16 21h3a2 2 0 0 0 2-2v-3"/>
        </svg>
      </button>
    </header>

    <div id="viewer-waiting" class="viewer-state">
      <div class="waiting-anim">
        <div class="pulse-ring"></div>
        <div class="pulse-dot"></div>
      </div>
      <h3>等待分享者</h3>
      <p id="viewer-wait-msg">尚未偵測到分享者，請稍候...</p>
      <button id="btn-viewer-back-wait" class="btn btn-ghost mt-4">← 返回首頁</button>
    </div>

    <div id="viewer-connecting" class="viewer-state hidden">
      <div class="spinner"></div>
      <p>正在建立連線...</p>
    </div>

    <div id="viewer-video-wrap" class="hidden">
      <video id="viewer-video" autoplay playsinline></video>
    </div>
  </section>

  <script src="app.js"></script>
</body>
</html>

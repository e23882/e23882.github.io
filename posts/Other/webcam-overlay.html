<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Webcam Overlay Tool</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: sans-serif;
            background: #1a1a1a;
            color: #eee;
            padding: 16px;
        }

        .layout {
            display: flex;
            gap: 16px;
            align-items: flex-start;
            flex-wrap: wrap;
        }

        /* ── 畫布區 ── */
        .canvas-wrapper {
            position: relative;
            width: 640px;
            height: 480px;
            background: #000;
            overflow: hidden;
            flex-shrink: 0;
            perspective: 800px;
            perspective-origin: center center;
        }

        #webcam, #overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            user-select: none;
            -webkit-user-drag: none;
            cursor: grab;
        }

        #webcam.dragging,
        #overlay.dragging { cursor: grabbing; }

        #webcam {
            width: 640px;
            height: 480px;
            object-fit: cover;
        }

        #overlay {
            max-width: none;
            max-height: none;
            object-fit: contain;
            z-index: 10;
        }

        /* ── resize handles ── */
        .rhandle {
            position: absolute;
            width: 12px;
            height: 12px;
            border-radius: 2px;
            border: 2px solid;
            background: #fff;
            z-index: 30;
            display: none;
        }

        .rhandle[data-key="wc"] { border-color: #4a9eff; }
        .rhandle[data-key="ov"] { border-color: #ff9a4a; }

        .rhandle[data-corner="nw"] { cursor: nw-resize; }
        .rhandle[data-corner="ne"] { cursor: ne-resize; }
        .rhandle[data-corner="sw"] { cursor: sw-resize; }
        .rhandle[data-corner="se"] { cursor: se-resize; }

        /* ── 控制面板 ── */
        .panels {
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-width: 280px;
        }

        .panel {
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            border-radius: 8px;
            padding: 12px 14px;
        }

        .panel-title {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #fff;
        }

        .control-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .control-row label {
            width: 60px;
            font-size: 12px;
            color: #ccc;
            flex-shrink: 0;
        }

        .control-row input[type="range"] {
            flex: 1;
            accent-color: #4a9eff;
        }

        .control-row .val {
            width: 52px;
            font-size: 12px;
            color: #4a9eff;
            text-align: right;
            flex-shrink: 0;
        }

        .flip-row {
            display: flex;
            gap: 8px;
            margin-top: 4px;
        }

        .flip-btn {
            flex: 1;
            padding: 5px 0;
            font-size: 12px;
            background: #3a3a3a;
            border: 1px solid #555;
            border-radius: 4px;
            color: #ccc;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
        }

        .flip-btn.active {
            background: #1a4a80;
            border-color: #4a9eff;
            color: #fff;
        }

        .file-row { margin-bottom: 10px; }

        .file-row input[type="file"] {
            font-size: 12px;
            color: #ccc;
            width: 100%;
        }

        .reset-btn {
            margin-top: 6px;
            padding: 4px 10px;
            font-size: 11px;
            background: #3a3a3a;
            border: 1px solid #555;
            border-radius: 4px;
            color: #aaa;
            cursor: pointer;
        }

        .reset-btn:hover { background: #4a4a4a; }

        /* ── 全螢幕容器 ── */
        #fsContainer {
            display: inline-flex;
            position: relative;
        }

        #fsContainer:fullscreen,
        #fsContainer:-webkit-full-screen {
            width: 100vw;
            height: 100vh;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ── 全螢幕按鈕（畫布右上角） ── */
        .fs-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 30px;
            height: 30px;
            background: rgba(0,0,0,0.55);
            border: 1px solid rgba(255,255,255,0.25);
            border-radius: 5px;
            color: #fff;
            font-size: 15px;
            line-height: 1;
            cursor: pointer;
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s;
        }

        .fs-btn:hover { background: rgba(255,255,255,0.2); }

        /* ── 面板拖把（各 panel 獨立） ── */
        .panel-handle {
            width: 100%;
            height: 22px;
            background: #242424;
            border-radius: 4px;
            cursor: grab;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            margin-bottom: 10px;
            flex-shrink: 0;
        }

        .panel-handle:hover    { background: #303030; }
        .panel-handle.grabbing { cursor: grabbing; }

        .panel-handle::after {
            content: '';
            width: 36px;
            height: 3px;
            background: rgba(255,255,255,0.22);
            border-radius: 2px;
            box-shadow: 0 -5px 0 rgba(255,255,255,0.22),
                        0  5px 0 rgba(255,255,255,0.22);
        }
    </style>
</head>
<body>

<div class="layout">

    <!-- 畫布 -->
    <div id="fsContainer">
    <div class="canvas-wrapper" id="canvasWrapper">
        <video id="webcam" autoplay playsinline></video>
        <img id="overlay" src="" alt="" style="display:none; opacity:0.5;">

        <!-- Webcam resize handles (藍) -->
        <div class="rhandle" data-key="wc" data-corner="nw"></div>
        <div class="rhandle" data-key="wc" data-corner="ne"></div>
        <div class="rhandle" data-key="wc" data-corner="sw"></div>
        <div class="rhandle" data-key="wc" data-corner="se"></div>

        <!-- Overlay resize handles (橘) -->
        <div class="rhandle" data-key="ov" data-corner="nw"></div>
        <div class="rhandle" data-key="ov" data-corner="ne"></div>
        <div class="rhandle" data-key="ov" data-corner="sw"></div>
        <div class="rhandle" data-key="ov" data-corner="se"></div>

        <button class="fs-btn" id="fsBtn" title="全螢幕">⛶</button>
    </div><!-- /canvasWrapper -->
    </div><!-- /fsContainer -->

    <!-- 控制面板 -->
    <div class="panels" id="panels">

        <!-- Webcam 設定 -->
        <div class="panel" id="panelWc">
            <div class="panel-handle"></div>
            <div class="panel-title">Webcam</div>

            <div class="control-row">
                <label>左右位移</label>
                <input type="range" id="wcX" min="-320" max="320" value="0">
                <span class="val" id="wcXVal">0</span>
            </div>
            <div class="control-row">
                <label>上下位移</label>
                <input type="range" id="wcY" min="-240" max="240" value="0">
                <span class="val" id="wcYVal">0</span>
            </div>
            <div class="control-row">
                <label>縮放</label>
                <input type="range" id="wcScale" min="0.1" max="4" step="0.01" value="1">
                <span class="val" id="wcScaleVal">1.00x</span>
            </div>
            <div class="control-row">
                <label>透明度</label>
                <input type="range" id="wcOpacity" min="0" max="1" step="0.01" value="1">
                <span class="val" id="wcOpacityVal">1.00</span>
            </div>

            <div class="flip-row">
                <button class="flip-btn" id="wcFlipH" onclick="toggleFlip('wc','H')">↔ 水平翻轉</button>
                <button class="flip-btn" id="wcFlipV" onclick="toggleFlip('wc','V')">↕ 垂直翻轉</button>
            </div>
            <div class="control-row" style="margin-top:8px;">
                <label>X軸旋轉</label>
                <input type="range" id="wcRotX" min="-90" max="90" step="0.5" value="0">
                <span class="val" id="wcRotXVal">0°</span>
            </div>
            <div class="control-row">
                <label>Y軸旋轉</label>
                <input type="range" id="wcRotY" min="-90" max="90" step="0.5" value="0">
                <span class="val" id="wcRotYVal">0°</span>
            </div>
            <div class="control-row">
                <label>Z軸旋轉</label>
                <input type="range" id="wcRotate" min="-180" max="180" step="0.5" value="0">
                <span class="val" id="wcRotateVal">0°</span>
            </div>

            <button class="reset-btn" onclick="resetTarget('wc')">重設</button>
        </div>

        <!-- 圖片設定 -->
        <div class="panel" id="panelOv">
            <div class="panel-handle"></div>
            <div class="panel-title">疊加圖片</div>

            <div class="file-row">
                <input type="file" id="imageInput" accept="image/*">
            </div>

            <div class="control-row">
                <label>左右位移</label>
                <input type="range" id="ovX" min="-320" max="320" value="0">
                <span class="val" id="ovXVal">0</span>
            </div>
            <div class="control-row">
                <label>上下位移</label>
                <input type="range" id="ovY" min="-240" max="240" value="0">
                <span class="val" id="ovYVal">0</span>
            </div>
            <div class="control-row">
                <label>縮放</label>
                <input type="range" id="ovScale" min="0.1" max="4" step="0.01" value="1">
                <span class="val" id="ovScaleVal">1.00x</span>
            </div>
            <div class="control-row">
                <label>透明度</label>
                <input type="range" id="ovOpacity" min="0" max="1" step="0.01" value="0.5">
                <span class="val" id="ovOpacityVal">0.50</span>
            </div>

            <div class="flip-row">
                <button class="flip-btn" id="ovFlipH" onclick="toggleFlip('ov','H')">↔ 水平翻轉</button>
                <button class="flip-btn" id="ovFlipV" onclick="toggleFlip('ov','V')">↕ 垂直翻轉</button>
            </div>
            <div class="control-row" style="margin-top:8px;">
                <label>X軸旋轉</label>
                <input type="range" id="ovRotX" min="-90" max="90" step="0.5" value="0">
                <span class="val" id="ovRotXVal">0°</span>
            </div>
            <div class="control-row">
                <label>Y軸旋轉</label>
                <input type="range" id="ovRotY" min="-90" max="90" step="0.5" value="0">
                <span class="val" id="ovRotYVal">0°</span>
            </div>
            <div class="control-row">
                <label>Z軸旋轉</label>
                <input type="range" id="ovRotate" min="-180" max="180" step="0.5" value="0">
                <span class="val" id="ovRotateVal">0°</span>
            </div>

            <button class="reset-btn" onclick="resetTarget('ov')">重設</button>
        </div>

    </div>
</div>

<script>
    const canvasWrapper = document.getElementById('canvasWrapper');
    const CANVAS_W = 640, CANVAS_H = 480;
    let canvasScale = 1; // 全螢幕時的縮放比例，用於座標換算

    // ── 狀態 ──────────────────────────────────────────
    const state = {
        wc: { x: 0, y: 0, scale: 1, opacity: 1,   flipH: false, flipV: false, rotate: 0, rotX: 0, rotY: 0 },
        ov: { x: 0, y: 0, scale: 1, opacity: 0.5, flipH: false, flipV: false, rotate: 0, rotX: 0, rotY: 0 },
    };

    const targets = {
        wc: document.getElementById('webcam'),
        ov: document.getElementById('overlay'),
    };

    // ── 套用 transform ────────────────────────────────
    function applyTransform(key) {
        const s = state[key];
        const el = targets[key];
        const scaleX = (s.flipH ? -1 : 1) * s.scale;
        const scaleY = (s.flipV ? -1 : 1) * s.scale;
        el.style.transform =
            `translate(calc(-50% + ${s.x}px), calc(-50% + ${s.y}px)) rotateX(${s.rotX}deg) rotateY(${s.rotY}deg) rotate(${s.rotate}deg) scale(${scaleX}, ${scaleY})`;
        el.style.opacity = s.opacity;
        updateHandles(key);
    }

    // ── resize handles 定位 ───────────────────────────
    // getBoundingClientRect 在 style 變更後強制同步 reflow，位置正確
    function updateHandles(key) {
        const el = targets[key];
        const handles = document.querySelectorAll(`.rhandle[data-key="${key}"]`);

        if (el.style.display === 'none') {
            handles.forEach(h => h.style.display = 'none');
            return;
        }

        const wRect = canvasWrapper.getBoundingClientRect();
        const eRect = el.getBoundingClientRect();

        // 若 rect 尚未有尺寸（圖片未載入）先略過
        if (eRect.width === 0 && eRect.height === 0) {
            handles.forEach(h => h.style.display = 'none');
            return;
        }

        const hs = 6; // handle 半邊 6px (12px / 2)
        // 除以 canvasScale：getBoundingClientRect 回傳螢幕像素，要轉回畫布內座標
        const l = (eRect.left - wRect.left) / canvasScale;
        const t = (eRect.top  - wRect.top)  / canvasScale;
        const r = l + eRect.width  / canvasScale;
        const b = t + eRect.height / canvasScale;

        const pos = { nw: [l, t], ne: [r, t], sw: [l, b], se: [r, b] };

        handles.forEach(h => {
            const [hx, hy] = pos[h.dataset.corner];
            h.style.left    = (hx - hs) + 'px';
            h.style.top     = (hy - hs) + 'px';
            h.style.display = 'block';
        });
    }

    // ── 滑桿 / 顯示值同步 ────────────────────────────
    // 將 state 值同步回滑桿與顯示文字
    function syncControl(key, prop, value) {
        const capProp = prop.charAt(0).toUpperCase() + prop.slice(1);
        const sliderId  = `${key}${capProp}`;
        const displayId = `${sliderId}Val`;
        const slider  = document.getElementById(sliderId);
        const display = document.getElementById(displayId);
        if (slider)  slider.value = value;
        if (display) display.textContent = formatVal(prop, value);
    }

    function formatVal(prop, v) {
        if (prop === 'scale')                         return v.toFixed(2) + 'x';
        if (prop === 'opacity')                       return v.toFixed(2);
        if (prop === 'rotate' || prop === 'rotX' || prop === 'rotY')
                                                      return (Math.round(v * 10) / 10) + '°';
        return Math.round(v);
    }

    // 滑桿 → state
    function bindSlider(id, key, prop, valId) {
        document.getElementById(id).addEventListener('input', e => {
            const v = parseFloat(e.target.value);
            state[key][prop] = v;
            document.getElementById(valId).textContent = formatVal(prop, v);
            applyTransform(key);
        });
    }

    bindSlider('wcX',       'wc', 'x',       'wcXVal');
    bindSlider('wcY',       'wc', 'y',       'wcYVal');
    bindSlider('wcScale',   'wc', 'scale',   'wcScaleVal');
    bindSlider('wcOpacity', 'wc', 'opacity', 'wcOpacityVal');
    bindSlider('wcRotX',    'wc', 'rotX',    'wcRotXVal');
    bindSlider('wcRotY',    'wc', 'rotY',    'wcRotYVal');
    bindSlider('wcRotate',  'wc', 'rotate',  'wcRotateVal');
    bindSlider('ovX',       'ov', 'x',       'ovXVal');
    bindSlider('ovY',       'ov', 'y',       'ovYVal');
    bindSlider('ovScale',   'ov', 'scale',   'ovScaleVal');
    bindSlider('ovOpacity', 'ov', 'opacity', 'ovOpacityVal');
    bindSlider('ovRotX',    'ov', 'rotX',    'ovRotXVal');
    bindSlider('ovRotY',    'ov', 'rotY',    'ovRotYVal');
    bindSlider('ovRotate',  'ov', 'rotate',  'ovRotateVal');

    // ── 翻轉切換 ──────────────────────────────────────
    function toggleFlip(key, axis) {
        const prop = axis === 'H' ? 'flipH' : 'flipV';
        state[key][prop] = !state[key][prop];
        document.getElementById(`${key}Flip${axis}`).classList.toggle('active', state[key][prop]);
        applyTransform(key);
    }

    // ── 重設 ──────────────────────────────────────────
    function resetTarget(key) {
        const defaults = key === 'wc'
            ? { x: 0, y: 0, scale: 1, opacity: 1,   flipH: false, flipV: false, rotate: 0, rotX: 0, rotY: 0 }
            : { x: 0, y: 0, scale: 1, opacity: 0.5, flipH: false, flipV: false, rotate: 0, rotX: 0, rotY: 0 };

        state[key] = { ...defaults };

        ['x', 'y', 'scale', 'opacity', 'rotX', 'rotY', 'rotate'].forEach(p => syncControl(key, p, defaults[p]));
        document.getElementById(`${key}FlipH`).classList.remove('active');
        document.getElementById(`${key}FlipV`).classList.remove('active');

        applyTransform(key);
    }

    // ── 拖拉互動 ──────────────────────────────────────
    let drag = null;

    function canvasPos(e) {
        const r = canvasWrapper.getBoundingClientRect();
        return {
            x: (e.clientX - r.left) / canvasScale,
            y: (e.clientY - r.top)  / canvasScale,
        };
    }

    // 拖拉移動：直接在元素上按下
    function initDragMove(key, e) {
        e.preventDefault();
        const p = canvasPos(e);
        drag = {
            type:        'move',
            key,
            startMouseX: p.x,
            startMouseY: p.y,
            startX:      state[key].x,
            startY:      state[key].y,
        };
        targets[key].classList.add('dragging');
        targets[key].setPointerCapture(e.pointerId);
    }

    targets.wc.addEventListener('pointerdown', e => initDragMove('wc', e));
    targets.ov.addEventListener('pointerdown', e => initDragMove('ov', e));

    // 拖拉縮放：按住 corner handle，以元素中心為基準計算距離比例
    document.querySelectorAll('.rhandle').forEach(h => {
        h.addEventListener('pointerdown', e => {
            e.preventDefault();
            e.stopPropagation();
            const key = h.dataset.key;
            const p   = canvasPos(e);
            const cx  = CANVAS_W / 2 + state[key].x;
            const cy  = CANVAS_H / 2 + state[key].y;
            const d0  = Math.hypot(p.x - cx, p.y - cy);
            drag = {
                type:       'resize',
                key,
                cx, cy,
                startDist:  d0 || 1,
                startScale: state[key].scale,
            };
            h.setPointerCapture(e.pointerId);
        });
    });

    window.addEventListener('pointermove', e => {
        if (!drag) return;
        const p = canvasPos(e);

        if (drag.type === 'move') {
            const newX = drag.startX + (p.x - drag.startMouseX);
            const newY = drag.startY + (p.y - drag.startMouseY);
            state[drag.key].x = newX;
            state[drag.key].y = newY;
            syncControl(drag.key, 'x', newX);
            syncControl(drag.key, 'y', newY);
            applyTransform(drag.key);

        } else if (drag.type === 'resize') {
            const dist = Math.hypot(p.x - drag.cx, p.y - drag.cy);
            const newScale = Math.max(0.1, Math.min(4, drag.startScale * (dist / drag.startDist)));
            state[drag.key].scale = newScale;
            syncControl(drag.key, 'scale', newScale);
            applyTransform(drag.key);
        }
    });

    window.addEventListener('pointerup', e => {
        if (!drag) return;
        if (drag.type === 'move') targets[drag.key].classList.remove('dragging');
        drag = null;
    });

    // ── 圖片上傳 ──────────────────────────────────────
    document.getElementById('imageInput').addEventListener('change', e => {
        const file = e.target.files[0];
        if (!file) return;
        const ov = targets.ov;
        ov.src = URL.createObjectURL(file);
        ov.style.display = '';
        ov.onload = () => applyTransform('ov');
    });

    // ── 啟動 Webcam ───────────────────────────────────
    async function startWebcam() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            targets.wc.srcObject = stream;
        } catch (err) {
            alert('請允許攝影機權限');
            console.error(err);
        }
    }

    // ── 全螢幕 ────────────────────────────────────────
    const fsBtn       = document.getElementById('fsBtn');
    const fsContainer = document.getElementById('fsContainer');

    fsBtn.addEventListener('click', () => {
        if (!document.fullscreenElement) {
            (fsContainer.requestFullscreen || fsContainer.webkitRequestFullscreen).call(fsContainer);
        } else {
            (document.exitFullscreen || document.webkitExitFullscreen).call(document);
        }
    });

    function onFsChange() {
        const isFs = !!(document.fullscreenElement || document.webkitFullscreenElement);
        fsBtn.textContent = isFs ? '✕' : '⛶';

        if (isFs) {
            // 用 rAF 確保全螢幕佈局完成後再讀尺寸
            requestAnimationFrame(() => {
                const sx = window.innerWidth  / CANVAS_W;
                const sy = window.innerHeight / CANVAS_H;
                canvasScale = Math.min(sx, sy);
                canvasWrapper.style.transform = `scale(${canvasScale})`;
                canvasWrapper.style.transformOrigin = 'center center';
                ['wc', 'ov'].forEach(k => updateHandles(k));
            });
        } else {
            canvasScale = 1;
            canvasWrapper.style.transform = '';
            ['wc', 'ov'].forEach(k => updateHandles(k));
        }
    }

    document.addEventListener('fullscreenchange',       onFsChange);
    document.addEventListener('webkitfullscreenchange', onFsChange);

    // ── 面板拖曳（各 panel 獨立） ────────────────────
    let floatZ = 500; // 每次拖起時遞增，讓最後拖動的永遠在最上層

    function makeDraggable(panelEl, handleEl) {
        let pd = null;

        handleEl.addEventListener('pointerdown', e => {
            e.preventDefault();
            const rect = panelEl.getBoundingClientRect();

            // 首次拖動：脫離文件流改為 fixed
            if (panelEl.style.position !== 'fixed') {
                panelEl.style.position = 'fixed';
                panelEl.style.left     = rect.left + 'px';
                panelEl.style.top      = rect.top  + 'px';
                panelEl.style.margin   = '0';
            }

            panelEl.style.zIndex = ++floatZ;

            pd = {
                startMouseX: e.clientX,
                startMouseY: e.clientY,
                startLeft:   parseFloat(panelEl.style.left),
                startTop:    parseFloat(panelEl.style.top),
            };

            handleEl.classList.add('grabbing');
            handleEl.setPointerCapture(e.pointerId);
        });

        handleEl.addEventListener('pointermove', e => {
            if (!pd) return;
            panelEl.style.left = (pd.startLeft + e.clientX - pd.startMouseX) + 'px';
            panelEl.style.top  = (pd.startTop  + e.clientY - pd.startMouseY) + 'px';
        });

        handleEl.addEventListener('pointerup', () => {
            pd = null;
            handleEl.classList.remove('grabbing');
        });
    }

    makeDraggable(
        document.getElementById('panelWc'),
        document.querySelector('#panelWc .panel-handle')
    );
    makeDraggable(
        document.getElementById('panelOv'),
        document.querySelector('#panelOv .panel-handle')
    );

    // ── 初始化 ────────────────────────────────────────
    applyTransform('wc');
    startWebcam();
</script>
